# ============================================================================
# Experiment: Smoke Test (CI validation)
# ============================================================================
# Tiny model, 1 epoch, ~20 samples. Runs in ~30s on CPU.
#
# CLI:
#   python train/train_sft.py --config configs/experiments/smoke_test.yaml

experiment_name: "smoke_test"
base_model_id: "sshleifer/tiny-gpt2"

training:
  max_length: 128
  batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 5.0e-4
  num_epochs: 1
  warmup_ratio: 0.0
  weight_decay: 0.0
  fp16: false
  bf16: false
  logging_steps: 1
  save_strategy: "epoch"
  eval_strategy: "epoch"
  seed: 42
  dataloader_num_workers: 0
  max_grad_norm: 1.0

lora:
  enabled: true
  r: 4
  alpha: 8
  dropout: 0.0
  target_modules:
    - "c_attn"
  bias: "none"
  task_type: "CAUSAL_LM"

dataset:
  files:
    - path: "data/smoke_test.jsonl"
      weight: 1.0
  eval_file: "data/smoke_test.jsonl"

output_dir: "runs/"
