# Smoke test dataset config
# Points to fixtures instead of real data

paths:
  raw_input: "tests/fixtures/dummy_raw.txt"          # unused by build_dataset
  normalized_dir: "tests/fixtures/output/normalized"        # Source of .S files
  splits_dir: "tests/fixtures/output/splits"
  jsonl_dir: "tests/fixtures/output/dataset"

seed: 42
split:
  train: 0.5
  val: 0.5
  test: 0.0

special_tokens:
  version: 1
  fim_prefix:   "<fim_prefix>"
  fim_suffix:   "<fim_suffix>"
  fim_middle:   "<fim_middle>"
  block_prefix: "<block_prefix>"
  block_end:    "<block_end>"
  task_open:    "<task>"
  task_close:   "</task>"
  asm_open:     "<asm>"
  eof_func:     "<eof_func>"

modes:
  causal:   1.0
  fim:      0.0
  block:    0.0
  function: 0.0

fim:
  min_prefix_lines: 1
  min_suffix_lines: 1

block:
  min_prefix_lines: 1
  max_prefix_ratio: 0.5

function:
  label_pattern: "^[a-zA-Z_][a-zA-Z0-9_]*:"
  include_directives: true

rv32im_opcodes:
  - addi
  - sw
  - lw
  - ret
  - li
  - mv
  - call

callee_saved_regs: [s0]
branch_instructions: [beq]

eval:
  seed: 42
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 16
  num_samples_pass_k: 1
  decoding: greedy
