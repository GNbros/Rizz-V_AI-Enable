name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Python backend tests (torch/transformers/peft are mocked — fast)
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2: VS Code extension tests (Xvfb provides virtual display for VS Code)
  # ---------------------------------------------------------------------------
  extension-tests:
    name: Extension Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: rizz-v/package-lock.json

      - name: Install extension dependencies
        working-directory: rizz-v
        run: npm ci

      - name: Install Xvfb (virtual display for headless VS Code)
        run: sudo apt-get install -y xvfb

      - name: Run extension tests
        working-directory: rizz-v
        run: xvfb-run -a npm test
        timeout-minutes: 10
