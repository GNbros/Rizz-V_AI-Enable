name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'pipeline/**.py'
      - 'pipeline/requirements.txt'
      - '.github/workflows/backend_ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pipeline/**.py'
      - 'pipeline/requirements.txt'
      - '.github/workflows/backend_ci.yml'

jobs:
  test-api:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # install test dependencies
        pip install pytest httpx flake8
        # install project dependencies
        if [ -f pipeline/requirements.txt ]; then pip install -r pipeline/requirements.txt; fi

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 pipeline/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 pipeline/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test API with mocks
      # Run only the mocked API test, excluding heavy e2e tests
      run: |
        pytest pipeline/tests/test_api_mock.py -v
