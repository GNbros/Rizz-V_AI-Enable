base_model: "Salesforce/codegen-350M-multi"

training:
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 2
  num_train_epochs: 5
  learning_rate: 5.0e-5
  warmup_steps: 100
  weight_decay: 0.01
  logging_steps: 50
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  fp16: true
  seed: 42
  data_seed: 42
  dataloader_num_workers: 4

data:
  max_seq_length: 512
