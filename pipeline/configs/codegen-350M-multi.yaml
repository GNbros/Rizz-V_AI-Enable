# Training Config for Salesforce/codegen-350M-multi

experiment_name: codegen-350M-multi
base_model_id: Salesforce/codegen-350M-multi

dataset:
  files:
    - path: data/processed/dataset/train.jsonl
      weight: 1.0
  eval_file: data/processed/dataset/val.jsonl

token_registry: configs/dataset.yaml

training:
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  save_strategy: "epoch"
  eval_strategy: "epoch"
  logging_steps: 10
  seed: 42
  fp16: true
  max_length: 512

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["qkv_proj"]
