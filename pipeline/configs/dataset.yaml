paths:
  raw_input: "riscv_dataset.txt"
  normalized_dir: "data/normalized"
  splits_dir: "data/splits"
  jsonl_dir: "data/jsonl"

special_tokens:
  pad_token: "<pad>"
  eos_token: "<|endoftext|>"
  unk_token: "<|endoftext|>"
  fim_prefix: "<fim_prefix>"
  fim_middle: "<fim_middle>"
  fim_suffix: "<fim_suffix>"

normalize:
  strip_license_headers: true
  strip_comments: true
  strip_block_comments: true
  collapse_blank_lines: true
  indent_spaces: 4
  register_alias_direction: "abi"  # 'abi' (x1->ra) or 'xreg' (ra->x1) or '' (none)

split:
  train: 0.8
  val: 0.1
  test: 0.1
  seed: 42

modes:
  causal: 0.4
  fim: 0.3
  block: 0.2
  function: 0.1

# ---------------------------------------------------------------------------
# RV32IM Opcodes  (single source of truth – used by eval & lint scripts)
# ---------------------------------------------------------------------------
rv32im_opcodes:
  # RV32I base
  - lui
  - auipc
  - jal
  - jalr
  - beq
  - bne
  - blt
  - bge
  - bltu
  - bgeu
  - lb
  - lh
  - lw
  - lbu
  - lhu
  - sb
  - sh
  - sw
  - addi
  - slti
  - sltiu
  - xori
  - ori
  - andi
  - slli
  - srli
  - srai
  - add
  - sub
  - sll
  - slt
  - sltu
  - xor
  - srl
  - sra
  - or
  - and
  - fence
  - ecall
  - ebreak
  # RV32M multiply extension
  - mul
  - mulh
  - mulhsu
  - mulhu
  - div
  - divu
  - rem
  - remu
  # Common pseudo-instructions
  - nop
  - li
  - la
  - mv
  - not
  - neg
  - seqz
  - snez
  - sltz
  - sgtz
  - j
  - jr
  - ret
  - call
  - tail

# ---------------------------------------------------------------------------
# ABI Lint Constants  (used by scripts/abi_lint.py)
# ---------------------------------------------------------------------------
callee_saved_regs:
  - s0
  - s1
  - s2
  - s3
  - s4
  - s5
  - s6
  - s7
  - s8
  - s9
  - s10
  - s11

branch_instructions:
  - beq
  - bne
  - blt
  - bge
  - bltu
  - bgeu
  - j
  - jal
  - bnez
  - beqz
  - blez
  - bgez
  - bltz
  - bgtz

# ---------------------------------------------------------------------------
# Default Evaluation Decoding  (deterministic – seed + params logged to output)
# ---------------------------------------------------------------------------
eval_decoding:
  temperature: 0.8
  top_p: 0.95
  seed: 42
  max_new_tokens: 256
