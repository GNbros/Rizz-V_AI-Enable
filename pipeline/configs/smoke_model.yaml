# Smoke test training config
# Minimal epochs and batch size

experiment_name: smoke_test
base_model_id: Salesforce/codegen-350M-multi
output_dir: pipeline/tests/fixtures/output/runs

# Point to the dataset generated by build_dataset using smoke_dataset.yaml
dataset:
  files:
    - path: pipeline/tests/fixtures/output/dataset/train.jsonl
      weight: 1.0
  eval_file: pipeline/tests/fixtures/output/dataset/val.jsonl

# Use the smoke token registry
token_registry: pipeline/configs/smoke_dataset.yaml

training:
  num_epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.00001
  save_strategy: "epoch"
  eval_strategy: "epoch"
  logging_steps: 1
  seed: 42
  fp16: false
  max_length: 64

lora:
  enabled: true
  r: 4
  alpha: 8
  dropout: 0.0
  target_modules: ["qkv_proj"]
